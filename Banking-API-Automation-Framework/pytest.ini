[pytest]
addopts = -ra -q --alluredir=reports/allure-results
testpaths = tests
markers =
    smoke: critical API checks
    regression: full banking regression checks
    negative: negative and validation checks
    schema: JSON schema contract checks
    auth: authentication checks
    account: account checks
    beneficiary: beneficiary checks
    transfer: transfer checks
    transaction: transaction checks
log_cli = true
log_cli_level = INFO
